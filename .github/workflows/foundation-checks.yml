name: Foundation Checks

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify-structure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify public scaffold exists
        run: |
          test -f README.md
          test -f apps/android/README.md
          test -f apps/ios/README.md
          test -f packages/design-tokens/tokens.json
          test -f packages/docs/adr/0001-public-private-boundary.md
          test -f packages/docs/architecture/public-api-catalog.json
          test -f packages/docs/architecture/module-stability-matrix.md
      - name: Verify public API catalog
        run: |
          bash tools/ci/check-public-api-catalog.sh
      - name: Verify storefront client contract
        run: |
          bash tools/ci/check-storefront-client-contract.sh
      - name: Verify release contract files
        run: |
          test -f packages/docs/architecture/compatibility-lab.md
          test -f tools/release/release-manifest.json
          test -f tools/ci/check-compatibility-lab.sh
      - name: Guard against business folders in public repo
        run: |
          ! find . -type d \( -name checkout -o -name orders -o -name payment -o -name catalog \)
